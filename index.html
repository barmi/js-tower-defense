<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tower Defense (Grid)</title>
    <link rel="stylesheet" href="./style.css" />
</head>
<body>
<header class="topbar">
    <div class="title">
        <span class="badge">TD</span>
        <span>Build & Play TD</span>
    </div>

    <div class="stats">
        <div class="stat"><div class="k">Mode</div><div class="v" id="modeLabel">GAME</div></div>
        <div class="stat"><div class="k">Wave</div><div class="v" id="wave">1</div></div>
        <div class="stat"><div class="k">Lives</div><div class="v" id="lives">20</div></div>
        <div class="stat"><div class="k">Gold</div><div class="v" id="gold">120</div></div>
        <div class="stat"><div class="k">Enemies</div><div class="v" id="enemies">0</div></div>
    </div>

    <div class="actions">
        <button id="btnMode" class="btn">Edit Mode</button>
        <button id="btnStart" class="btn primary">Start</button>
        <button id="btnNext" class="btn">Skip Wait</button>
        <button id="btnReset" class="btn danger">Reset</button>
    </div>
</header>

<main class="layout">
    <section class="game">
        <svg id="scene" class="scene" width="960" height="600" viewBox="0 0 960 600" xmlns="http://www.w3.org/2000/svg" aria-label="Tower defense scene">
            <g id="grid"></g>
            <g id="path"></g>
            <g id="towers"></g>
            <g id="bullets"></g>
            <g id="enemiesLayer"></g>

            <g id="overlay">
                <text id="hint" x="18" y="28" fill="rgba(255,255,255,0.75)" font-size="14" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
                    Build a tower on an empty tile.
                </text>
            </g>
        </svg>

        <div class="note mono" id="note"></div>
    </section>

    <aside class="side">
        <div class="card" id="buildCard">
            <div class="card-title">Build</div>
            <div class="card-body">
                <div id="buildList" class="build-list"></div>
                <hr class="sep" />
                <div class="small" id="buildHint"></div>
            </div>
        </div>

        <div class="card" id="upgradeCard">
            <div class="card-title">Tower Upgrade</div>
            <div class="card-body">
                <div id="upgradePanel" class="small"></div>
                <div class="inline-actions">
                    <button id="btnUpgrade" class="btn">Upgrade</button>
                    <button id="btnSell" class="btn danger">Sell</button>
                </div>
            </div>
        </div>

        <div class="card editor-card" id="editorCard" hidden>
            <div class="card-title">Editor</div>
            <div class="card-body editor-body">
                <div class="editor-section">
                    <div class="section-title">Grid Size</div>
                    <div class="editor-row">
                        <label>Cols <input id="editCols" type="number" min="6" max="40" step="1" /></label>
                        <label>Rows <input id="editRows" type="number" min="6" max="30" step="1" /></label>
                        <button id="btnApplyGrid" class="btn">Apply</button>
                    </div>
                </div>

                <div class="editor-section">
                    <div class="section-title">Paint Tool</div>
                    <div class="paint-tools" id="paintTools">
                        <button class="tool-btn active" data-tool="empty" title="Empty"><span class="picon empty"></span></button>
                        <button class="tool-btn" data-tool="path" title="Path"><span class="picon path"></span></button>
                        <button class="tool-btn" data-tool="obstacle" title="Obstacle"><span class="picon obstacle"></span></button>
                        <button class="tool-btn" data-tool="start" title="Start"><span class="picon start"></span></button>
                        <button class="tool-btn" data-tool="end" title="End"><span class="picon end"></span></button>
                        <button class="tool-btn" data-tool="clear_all" title="Clear All"><span class="picon clear"></span></button>
                    </div>
                    <div class="small">Path: drag. Others: click.</div>
                </div>

                <div class="editor-section">
                    <div class="section-title">Tower Levels</div>
                    <div class="editor-row">
                        <label>Max Level <input id="maxLevelInput" type="number" min="2" max="8" step="1" /></label>
                        <button id="btnApplyLevels" class="btn">Apply</button>
                    </div>
                    <table class="cfg-table" id="towerLevelTable"></table>
                </div>

                <div class="editor-section">
                    <div class="section-title">Tower Base Stats</div>
                    <table class="cfg-table" id="towerBaseTable"></table>
                </div>

                <div class="editor-section">
                    <div class="section-title">Enemy Wave Growth</div>
                    <table class="cfg-table" id="enemyTable"></table>
                </div>

                <div class="editor-section">
                    <div class="section-title">Config String</div>
                    <div class="editor-row">
                        <button id="btnGenerate" class="btn primary">Generate</button>
                        <button id="btnLoad" class="btn">Load</button>
                    </div>
                    <textarea id="configText" class="config-text" placeholder="Config string will appear here."></textarea>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Status</div>
            <div class="card-body mono small" id="debug"></div>
        </div>
    </aside>
</main>

<script src="./app.js"></script>
</body>
</html>
